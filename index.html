<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>eShopify</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  </head>
  <body>
    <header class="d-flex justify-content-between px-5 align-items-center py-3">
      <img src="./media/logo.png" alt="logo" class="logo">
      <nav class="d-lg-flex gap-5 d-none">
        <a class="nav-link" href="">Home</a>
        <a class="nav-link" href="">Shop</a>
        <a class="nav-link" href="">About</a>
        <a class="nav-link" href="">Contact</a>
      </nav>
      <div class="d-flex gap-2">
        <div class="border d-flex border-1 border-dark rounded gap-1 input-group px-2 py-1" style="max-width: 200px;">
          <i class="bi bi-search input-group-text"></i>
          <input type="search" name="search" id="search" placeholder="Search" class="border-0 form-control">
        </div>

        <button class="btn border d-lg-none d-flex align-items-center" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasTop" aria-controls="offcanvasTop">
          <i class="bi bi-list"></i>
        </button>

        <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvasTop" aria-labelledby="offcanvasTopLabel">
          <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="offcanvasTopLabel">Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
          </div>
          <div class="offcanvas-body d-flex flex-column gap-4">
             <nav class="d-flex flex-column gap-2">
                <a class="nav-link" href="">Home</a>
                <a class="nav-link" href="">Shop</a>
                <a class="nav-link" href="">About</a>
                <a class="nav-link" href="">Contact</a>
              </nav>
              <div class="d-flex align-items-center gap-4">
                <div class="dropdown border border-1 rounded px-3 d-flex gap-2 align-items-center">
                  <i class="bi bi-person-circle"></i>
                  <button class="dropdown-toggle btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">Account</button>
                  <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Login</a></li>
                    <li><a class="dropdown-item" href="#">Sign-up</a></li>
                  </ul>
                </div>
                <div class="d-flex align-items-center gap-2 border border-1 rounded px-3 position-relative">
                  <i class="bi bi-cart4"></i>
                  <div class="badge bg-danger align-self-start rounded-pill position-absolute top-0 translate-middle start-100">1</div>
                  <button class="btn">Cart</button>
                </div>
              </div>
            </div>
          </div>
      </div>
          <div class="d-none d-lg-flex align-items-center gap-3">
            <div class="dropdown border border-1 rounded px-2 d-flex gap-2 align-items-center">
              <i class="bi bi-person-circle"></i>
              <button class="dropdown-toggle btn" type="button" data-bs-toggle="dropdown" aria-expanded="false">Account</button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item" href="#">Login</a></li>
                <li><a class="dropdown-item" href="#">Sign-up</a></li>
              </ul>
            </div>
            <div class="d-flex align-items-center gap-2 border border-1 rounded px-2 position-relative">
              <i class="bi bi-cart4"></i>
              <div class="badge bg-danger align-self-start rounded-pill position-absolute top-0 translate-middle start-100">1</div>
              <button class="btn">Cart</button>
            </div>
          </div>
    </header>    
    <main></main>
    <section></section>
    <footer></footer>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
